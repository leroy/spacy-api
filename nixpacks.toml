# Railway / Nixpacks config for spaCy + FastAPI
# Downloads Dutch model during build so it's bundled in the deploy

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
    "pip install --upgrade pip setuptools wheel",
    "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080}"
